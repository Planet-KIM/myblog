{% extends "base.html" %}
{% block content %}
<article>
  <h2>{{ post.title }}</h2>
  <p class="text-muted">
    {{ post.author }} · {{ post.created_at.strftime("%Y-%m-%d %H:%M") }}
  </p>
  <div class="mt-3">
    <pre>{{ post.content }}</pre>
  </div>
  <a href="/" class="btn btn-secondary mt-3">Back to home</a>
</article>
{% endblock %}
